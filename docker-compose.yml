services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: proxyfaux
      POSTGRES_USER: proxyfaux
      POSTGRES_PASSWORD: proxyfaux
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxyfaux -d proxyfaux"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    command: sh -c "uv sync && uv run python manage.py migrate && uv run python manage.py runserver 0.0.0.0:8009"
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql://proxyfaux:proxyfaux@db:5432/proxyfaux
      FRONTEND_DIST_DIR: /frontend-dist
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - ./frontend/dist:/frontend-dist:ro
    ports:
      - "8009:8009"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 6174"
    env_file:
      - ./frontend/.env.example
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "6174:6174"
    depends_on:
      - backend

volumes:
  backend_venv:
  postgres_data:
  frontend_node_modules:
